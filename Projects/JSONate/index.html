<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSONate</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 800px;
            margin-top: 30px;
        }
        .card {
            border: 1px solid #dee2e6;
            border-radius: 0.25rem;
        }
        .card-header {
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }
        .card-body {
            background-color: #ffffff;
            padding: 20px;
        }
        .json-output-container {
            position: relative;
        }
        .copy-button {
            position: absolute;
            right: 0;
            top: 0;
        }
        .json-output {
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                Excel to JSON Converter
            </div>
            <div class="card-body">
                <div class="alert alert-info" role="alert">
                    This project is designed to efficiently handle large Excel datasets and convert them into JSON format.
                </div>
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="fileInput">Upload Excel File</label>
                        <input type="file" class="form-control-file" id="fileInput" accept=".xlsx" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Convert to JSON</button>
                </form>
                <div class="mt-4 json-output-container">
                    <h3>JSON Output:</h3>
                    <div class="mb-2">
                        <span id="lineCountLabel">Lines read: 0</span>
                    </div>
                    <pre id="jsonOutput" class="json-output bg-light p-3 border"></pre>
                    <button id="copyButton" class="btn btn-secondary copy-button">Copy to Clipboard</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.9/xlsx.full.min.js"></script>
    <script>
document.getElementById('uploadForm').addEventListener('submit', function(event) {
    event.preventDefault();
    const fileInput = document.getElementById('fileInput');
    if (fileInput.files.length === 0) {
        alert('Please select an Excel file.');
        return;
    }
    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const jsonData = XLSX.utils.sheet_to_json(sheet, { defval: "" }); // Include blank values

        // Extract headers from the first row of the sheet
        const headers = Object.keys(jsonData[0] || {});
        
        // Map rows to JSON using dynamic headers
        const formattedJson = jsonData.map(row => {
            const result = {};
            headers.forEach(header => {
                result[header] = row[header] || ""; // Include blank values
            });
            return result;
        });

        document.getElementById('jsonOutput').textContent = JSON.stringify(formattedJson, null, 2);
        document.getElementById('lineCountLabel').textContent = `Lines read: ${jsonData.length}`;
    };

    reader.readAsArrayBuffer(file);
});

    </script>
</body>
</html>
